<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet JSP — CIS Cruzy-Quarante</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bleu: #1a3c6e;
    --bleu-clair: #2563b0;
    --bleu-pale: #dbeafe;
    --rouge: #b91c1c;
    --rouge-pale: #fee2e2;
    --blanc: #ffffff;
    --gris-bg: #f3f4f6;
    --gris-bord: #e5e7eb;
    --gris-txt: #6b7280;
    --vert: #166534;
    --vert-pale: #dcfce7;
    --orange: #b45309;
    --orange-pale: #fef3c7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: var(--gris-bg); color: #1f2937; min-height: 100vh; }

  /* ── HEADER ─────────────────────────── */
  .header {
    background: linear-gradient(135deg, var(--bleu) 0%, var(--bleu-clair) 100%);
    color: white;
    padding: 0;
    display: flex;
    align-items: stretch;
  }
  .header-bande {
    width: 8px;
    background: repeating-linear-gradient(180deg, var(--bleu) 0px, var(--bleu) 33%, white 33%, white 66%, var(--rouge) 66%, var(--rouge) 100%);
    background-size: 8px 24px;
  }
  .header-content {
    flex: 1;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .flamme { font-size: 32px; }
  .header-titre h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
  .header-titre p { font-size: 13px; opacity: 0.8; margin-top: 2px; }
  .header-user {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    opacity: 0.9;
  }
  .btn-logout {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    color: white;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.3); }

  /* ── LOGIN ──────────────────────────── */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--gris-bg);
  }
  .login-card {
    background: white;
    border-radius: 16px;
    border: 0.5px solid var(--gris-bord);
    padding: 40px 36px;
    width: 360px;
    text-align: center;
  }
  .login-flamme { font-size: 48px; margin-bottom: 8px; }
  .login-card h2 { font-size: 20px; color: var(--bleu); margin-bottom: 4px; }
  .login-card p { font-size: 13px; color: var(--gris-txt); margin-bottom: 24px; }
  .login-card label { display: block; text-align: left; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #374151; }
  .login-card input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--gris-bord);
    border-radius: 8px; font-size: 14px; margin-bottom: 16px;
  }
  .login-card input:focus { outline: none; border-color: var(--bleu-clair); box-shadow: 0 0 0 3px var(--bleu-pale); }
  .btn-primary {
    background: var(--bleu);
    color: white;
    border: none;
    padding: 11px 20px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  .btn-primary:hover { background: var(--bleu-clair); }
  .login-error { color: var(--rouge); font-size: 13px; margin-top: -8px; margin-bottom: 12px; }

  /* ── LAYOUT ─────────────────────────── */
  .app { display: none; }
  .main { display: flex; min-height: calc(100vh - 64px); }
  .sidebar {
    width: 220px;
    background: white;
    border-right: 0.5px solid var(--gris-bord);
    padding: 16px 0;
    flex-shrink: 0;
  }
  .sidebar-section { padding: 6px 16px 2px; font-size: 11px; font-weight: 700; color: var(--gris-txt); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 8px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 20px; cursor: pointer; font-size: 14px; color: #374151;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .nav-item:hover { background: var(--gris-bg); }
  .nav-item.active { background: var(--bleu-pale); color: var(--bleu); border-left-color: var(--bleu); font-weight: 600; }
  .nav-item i { font-size: 18px; }
  .badge-nav {
    margin-left: auto; background: var(--rouge); color: white;
    font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 10px;
  }

  .content { flex: 1; padding: 24px; overflow-y: auto; }

  /* ── JSP SELECTOR (admin) ─────────────── */
  .jsp-selector {
    display: flex; align-items: center; gap: 12px;
    background: white; border: 0.5px solid var(--gris-bord);
    border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
  }
  .jsp-selector label { font-size: 13px; font-weight: 600; color: #374151; }
  .jsp-selector select {
    flex: 1; padding: 7px 10px; border: 1px solid var(--gris-bord);
    border-radius: 6px; font-size: 14px;
  }

  /* ── SECTION HEADER ─────────────────── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-header h2 { font-size: 18px; color: var(--bleu); font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .btn-add {
    display: flex; align-items: center; gap: 6px;
    background: var(--bleu); color: white; border: none;
    padding: 8px 14px; border-radius: 8px; font-size: 13px;
    font-weight: 600; cursor: pointer;
  }
  .btn-add:hover { background: var(--bleu-clair); }
  .btn-add i { font-size: 16px; }

  /* ── CARDS STATS ─────────────────────── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: white; border-radius: 10px; border: 0.5px solid var(--gris-bord);
    padding: 16px; text-align: center;
  }
  .stat-card .stat-val { font-size: 28px; font-weight: 700; }
  .stat-card .stat-lbl { font-size: 12px; color: var(--gris-txt); margin-top: 4px; }
  .stat-card.rouge .stat-val { color: var(--rouge); }
  .stat-card.orange .stat-val { color: var(--orange); }
  .stat-card.vert .stat-val { color: var(--vert); }
  .stat-card.bleu .stat-val { color: var(--bleu-clair); }

  /* ── TABLE ───────────────────────────── */
  .table-card { background: white; border-radius: 12px; border: 0.5px solid var(--gris-bord); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead { background: var(--bleu); color: white; }
  thead th { padding: 11px 14px; text-align: left; font-weight: 600; font-size: 13px; }
  tbody tr { border-bottom: 0.5px solid var(--gris-bord); }
  tbody tr:hover { background: var(--gris-bg); }
  tbody td { padding: 10px 14px; }
  .empty-row td { text-align: center; color: var(--gris-txt); padding: 32px; font-size: 14px; }

  /* ── BADGES ──────────────────────────── */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  .badge-rouge { background: var(--rouge-pale); color: var(--rouge); }
  .badge-vert { background: var(--vert-pale); color: var(--vert); }
  .badge-orange { background: var(--orange-pale); color: var(--orange); }
  .badge-bleu { background: var(--bleu-pale); color: var(--bleu); }
  .badge-gris { background: var(--gris-bg); color: #374151; }

  /* ── MODAL ───────────────────────────── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: white; border-radius: 14px; padding: 28px;
    width: 440px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
  }
  .modal h3 { font-size: 17px; color: var(--bleu); font-weight: 700; margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #374151; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 9px 12px; border: 1px solid var(--gris-bord);
    border-radius: 8px; font-size: 14px; font-family: Arial, sans-serif;
  }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: var(--bleu-clair); box-shadow: 0 0 0 3px var(--bleu-pale);
  }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel {
    padding: 9px 16px; border: 1px solid var(--gris-bord); background: white;
    border-radius: 8px; font-size: 14px; cursor: pointer;
  }
  .btn-cancel:hover { background: var(--gris-bg); }
  .btn-save {
    padding: 9px 16px; background: var(--bleu); color: white;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .btn-save:hover { background: var(--bleu-clair); }
  .btn-danger {
    padding: 9px 16px; background: var(--rouge); color: white;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
  }

  /* ── PLANNING ─────────────────────────── */
  .planning-grid { display: grid; gap: 10px; }
  .planning-item {
    background: white; border-radius: 10px; border-left: 4px solid var(--bleu);
    border-top: 0.5px solid var(--gris-bord); border-right: 0.5px solid var(--gris-bord); border-bottom: 0.5px solid var(--gris-bord);
    padding: 12px 16px; display: flex; align-items: center; gap: 16px;
  }
  .planning-date { font-size: 13px; font-weight: 700; color: var(--bleu); min-width: 90px; }
  .planning-titre { font-size: 14px; font-weight: 600; flex: 1; }
  .planning-type { font-size: 12px; color: var(--gris-txt); }

  /* ── IMPORT SHEETS ─────────────────────── */
  .import-zone {
    border: 2px dashed var(--gris-bord); border-radius: 12px;
    padding: 24px; text-align: center; background: white; margin-bottom: 16px;
  }
  .import-zone i { font-size: 36px; color: var(--gris-txt); }
  .import-zone p { font-size: 14px; color: var(--gris-txt); margin: 8px 0; }
  .import-zone input[type="text"] {
    width: 100%; padding: 9px 12px; border: 1px solid var(--gris-bord);
    border-radius: 8px; font-size: 13px; margin: 8px 0;
  }

  /* ── NOTE VISUELLE ─────────────────────── */
  .note-bar { display: flex; align-items: center; gap: 4px; }
  .note-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--gris-bord); }
  .note-dot.filled-vert { background: var(--vert); }
  .note-dot.filled-orange { background: var(--orange); }
  .note-dot.filled-rouge { background: var(--rouge); }

  /* ── ACCUEIL PARENT ─────────────────────── */
  .enfant-card {
    background: linear-gradient(135deg, var(--bleu) 0%, var(--bleu-clair) 100%);
    color: white; border-radius: 14px; padding: 20px 24px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .enfant-avatar {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,255,255,0.25); display: flex; align-items: center;
    justify-content: center; font-size: 22px; font-weight: 700;
  }
  .enfant-card h2 { font-size: 18px; font-weight: 700; }
  .enfant-card p { font-size: 13px; opacity: 0.85; margin-top: 3px; }

  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--gris-bord); margin-bottom: 20px; }
  .tab {
    padding: 9px 18px; cursor: pointer; font-size: 14px; font-weight: 600;
    color: var(--gris-txt); border-bottom: 2px solid transparent; margin-bottom: -2px;
  }
  .tab:hover { color: var(--bleu); }
  .tab.active { color: var(--bleu); border-bottom-color: var(--bleu); }

  .hidden { display: none !important; }

  .alert {
    padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 12px;
  }
  .alert-info { background: var(--bleu-pale); color: var(--bleu); }
  .alert-success { background: var(--vert-pale); color: var(--vert); }

  .sheets-url-hint { font-size: 12px; color: var(--gris-txt); margin-top: 4px; }

  @media (max-width: 640px) {
    .sidebar { width: 56px; }
    .nav-item span, .nav-item .badge-nav, .sidebar-section { display: none; }
    .nav-item { justify-content: center; padding: 12px; }
  }
</style>
</head>

let DB = loadData();

// ══════════════════════════════════════════
//  SYNC DEPUIS L'APPLI D'APPEL
// ══════════════════════════════════════════
const APPEL_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzj-b3hQl0y9FK4VB1ckZagfYenJwfMVAq0-i6tS3ThIvU64UFxltqHknYhFDsBj7pqng/exec';

// Mapping ID appel → ID carnet JSP
const APPEL_TO_CARNET = {101: 4, 102: 4, 103: 5, 104: 3, 105: 7, 106: 6, 107: 2, 108: 1, 201: 9, 202: 10, 203: 8, 204: 11, 205: null, 301: 15, 302: 12, 303: 14, 304: 13, 401: 19, 402: null, 403: 18, 404: 16, 405: 17};

async function syncAbsencesFromAppel() {
  const btn = document.getElementById('btnSyncAppel');
  if (btn) { btn.textContent = '⏳ Synchronisation...'; btn.disabled = true; }
  try {
    const resp = await fetch(APPEL_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({action: 'getSeances'})
    });
    const seances = await resp.json();

    let imported = 0;
    const today = new Date().toISOString().slice(0, 10);

    seances.forEach(row => {
      try {
        const id = row[0];
        const date = row[1];
        const heure = row[2];
        const theme = row[3];
        const st = JSON.parse(row[4]);

        // Pour chaque JSP absent (A), on crée une absence dans le carnet
        Object.entries(st).forEach(([appelId, statut]) => {
          const carnetId = APPEL_TO_CARNET[parseInt(appelId)];
          if (!carnetId) return; // JSP pas dans le carnet

          // Vérifier si cette absence existe déjà (même date + même jspId)
          const exists = DB.absences.find(a =>
            a.date === date && a.jspId === carnetId && a.source === 'appel'
          );
          if (exists) return;

          if (statut === 'A' || statut === 'R' || statut === 'E' || statut === 'ER') {
            DB.absences.push({
              id: Date.now() + Math.random(),
              jspId: carnetId,
              date: date,
              motif: theme || 'Séance JSP',
              excusee: statut === 'E' || statut === 'ER',
              remarque: 'Statut : ' + statut + (heure ? ' — ' + heure : ''),
              source: 'appel'
            });
            imported++;
          }

          // Retards
          if (statut === 'R' || statut === 'ER') {
            const existsR = DB.retards.find(r =>
              r.date === date && r.jspId === carnetId && r.source === 'appel'
            );
            if (!existsR) {
              DB.retards.push({
                id: Date.now() + Math.random(),
                jspId: carnetId,
                date: date,
                duree: '—',
                motif: theme || 'Séance JSP',
                remarque: statut,
                source: 'appel'
              });
            }
          }
        });
      } catch(e) {}
    });

    saveData();
    if (btn) { btn.textContent = '✅ Synchronisé (' + imported + ' nouvelles entrées)'; btn.disabled = false; }
    setTimeout(() => {
      if (btn) btn.textContent = '🔄 Sync depuis appli d\'appel';
    }, 4000);
    showSection(currentSection);
  } catch(e) {
    if (btn) { btn.textContent = '❌ Erreur de connexion'; btn.disabled = false; }
    setTimeout(() => {
      if (btn) btn.textContent = '🔄 Sync depuis appli d\'appel';
    }, 3000);
  }
}

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const user = DB.users.find(x => x.login === u && x.pass === p);
  if (!user) {
    document.getElementById('loginError').classList.remove('hidden');
    return;
  }
  currentUser = user;
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('headerUserName').textContent = user.nom;
  if (user.role === 'admin') {
    document.getElementById('sidebarAdmin').classList.remove('hidden');
    showSection('dashboard');
  } else {
    document.getElementById('sidebarParent').classList.remove('hidden');
    showSection('parent-accueil');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginWrap').style.display !== 'none') doLogin();
});

function doLogout() {
  currentUser = null;
  document.getElementById('loginWrap').style.display = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('sidebarAdmin').classList.add('hidden');
  document.getElementById('sidebarParent').classList.add('hidden');
  document.getElementById('loginError').classList.add('hidden');
}

function showSection(sec) {
  currentSection = sec;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const all = document.querySelectorAll('.nav-item');
  all.forEach(el => { if (el.getAttribute('onclick') && el.getAttribute('onclick').includes(sec)) el.classList.add('active'); });
  const c = document.getElementById('content');
  switch(sec) {
    case 'dashboard': c.innerHTML = renderDashboard(); break;
    case 'jsps': c.innerHTML = renderJSPs(); break;
    case 'absences': c.innerHTML = renderAbsences(); break;
    case 'retards': c.innerHTML = renderRetards(); break;
    case 'comportement': c.innerHTML = renderComportement(); break;
    case 'resultats': c.innerHTML = renderResultats(); break;
    case 'planning': c.innerHTML = renderPlanning(window._planningMois||null); break;
    case 'bilans': c.innerHTML = renderBilans(window._bilanJspId||null); break;
    case 'parent-accueil': c.innerHTML = renderParentAccueil(); break;
    case 'parent-absences': c.innerHTML = renderParentAbsences(); break;
    case 'parent-retards': c.innerHTML = renderParentRetards(); break;
    case 'parent-comportement': c.innerHTML = renderParentComportement(); break;
    case 'parent-resultats': c.innerHTML = renderParentResultats(); break;
    case 'parent-planning': c.innerHTML = renderParentPlanning(window._planningParentMois||null); break;
    case 'parent-bilan': c.innerHTML = renderParentBilan(); break;
  }
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,j] = d.split('-');
  return `${j}/${m}/${y}`;
}
function jspNom(id) {
  const j = DB.jsps.find(x => x.id == id);
  return j ? `${j.prenom} ${j.nom}` : '—';
}
function jspOptions(sel) {
  return DB.jsps.map(j => `<option value="${j.id}" ${sel==j.id?'selected':''}>${j.prenom} ${j.nom}</option>`).join('');
}
function noteColor(n, sur) {
  const r = n/sur;
  if (r >= 0.8) return 'vert';
  if (r >= 0.5) return 'orange';
  return 'rouge';
}
function noteDots(n, sur) {
  const pct = n/sur;
  const color = noteColor(n, sur);
  return `<div class="note-bar">${[...Array(10)].map((_,i) => `<div class="note-dot ${i/10 < pct ? 'filled-'+color : ''}"></div>`).join('')}</div>`;
}
function planningTypeBadge(t) {
  const map = { formation: 'badge-bleu', exercice: 'badge-orange', controle: 'badge-rouge', ceremonie: 'badge-vert' };
  return `<span class="badge ${map[t]||'badge-gris'}">${t}</span>`;
}
function nextId(arr) { return arr.length ? Math.max(...arr.map(x=>x.id))+1 : 1; }

function renderDashboard() {

  const retards = DB.retards.length;
  const reprimandes = DB.comportements.length;
  const prochains = DB.planning.filter(p => p.date >= new Date().toISOString().slice(0,10)).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,3);
  return `
    <div class="section-header"><h2><i class="ti ti-layout-dashboard" aria-hidden="true"></i> Tableau de bord</h2>
    <button id="btnSyncAppel" class="btn-add" style="background:#16a34a;font-size:13px" onclick="syncAbsencesFromAppel()"><i class="ti ti-refresh"></i> Sync depuis appli d\'appel</button></div>
    <div class="stats-grid">
      <div class="stat-card bleu"><div class="stat-val">${totalJSP}</div><div class="stat-lbl">JSP inscrits</div></div>
      <div class="stat-card rouge"><div class="stat-val">${absNE}</div><div class="stat-lbl">Absences non excusées</div></div>
      <div class="stat-card orange"><div class="stat-val">${retards}</div><div class="stat-lbl">Retards</div></div>
      <div class="stat-card rouge"><div class="stat-val">${reprimandes}</div><div class="stat-lbl">Comportements</div></div>
    </div>
    <div class="section-header"><h2><i class="ti ti-calendar-event" aria-hidden="true"></i> Prochains événements</h2></div>
    <div class="planning-grid">
      ${prochains.length ? prochains.map(p => `
        <div class="planning-item">
          <div class="planning-date"><i class="ti ti-calendar" aria-hidden="true"></i> ${fmtDate(p.date)}</div>
          <div><div class="planning-titre">${p.titre}</div><div class="planning-type">${p.lieu}</div></div>
          ${planningTypeBadge(p.type)}
        </div>`).join('') : '<p style="color:var(--gris-txt);font-size:14px">Aucun événement à venir</p>'}
    </div>
    <div style="margin-top:24px" class="section-header"><h2><i class="ti ti-users" aria-hidden="true"></i> Liste rapide des JSP</h2></div>
    <div class="table-card">
      <table>
        <thead><tr><th>JSP</th><th>Promotion</th><th>Absences</th><th>Retards</th><th>Résultats</th></tr></thead>
        <tbody>
          ${DB.jsps.map(j => {
            const abs = DB.absences.filter(a=>a.jspId==j.id).length;
            const ret = DB.retards.filter(r=>r.jspId==j.id).length;
            const res = DB.resultats.filter(r=>r.jspId==j.id);
            const moy = res.length ? (res.reduce((s,r)=>s+r.note/r.sur*20,0)/res.length).toFixed(1) : '—';
            return `<tr>
              <td><strong>${j.prenom} ${j.nom}</strong></td>
              <td><span class="badge badge-bleu">${j.promotion}</span></td>
              <td><span class="badge ${abs>0?'badge-rouge':'badge-vert'}">${abs}</span></td>
              <td><span class="badge ${ret>0?'badge-orange':'badge-vert'}">${ret}</span></td>
              <td>${moy !== '—' ? `<span class="badge badge-${noteColor(parseFloat(moy),20)}">${moy}/20</span>` : '—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

// ══════════════════════════════════════════
function getSaisonMois(saison) {
  const [y1, y2] = saison.split('-').map(Number);
  const labels = {1:'Jan',2:'Fev',3:'Mar',4:'Avr',5:'Mai',6:'Juin',7:'Juil',8:'Aout',9:'Sep',10:'Oct',11:'Nov',12:'Dec'};
  const mois = [];
  for (let m = 9; m <= 12; m++) mois.push({num: String(m).padStart(2,'0'), an: String(y1), label: labels[m]+' '+y1});
  for (let m = 1; m <= 8; m++) mois.push({num: String(m).padStart(2,'0'), an: String(y2), label: labels[m]+' '+y2});
  return mois;
}

function changerSaison(saison) {
  if (typeof saison !== 'string') return;
  // Sauvegarder le planning actuel sous la clé de la saison actuelle
  const key = 'carnet_jsp_planning_'+DB.saison;
  localStorage.setItem(key, JSON.stringify(DB.planning));
  // Charger le planning de la nouvelle saison
  const savedKey = 'carnet_jsp_planning_'+saison;
  const saved = localStorage.getItem(savedKey);
  DB.planning = saved ? JSON.parse(saved) : [];
  DB.saison = saison;
  if (!DB.allSaisons.includes(saison)) DB.allSaisons.push(saison);
  saveData();
  window._planningMois = null;
  showSection('planning');
}

function modalNouvelleSaison() {
  const annees = [];
  for (let y = 2024; y <= 2035; y++) annees.push(y+'-'+(y+1));
  openModal('<h3><i class="ti ti-calendar-plus"></i> Nouvelle saison</h3>'
    +'<div class="form-group"><label>Annee scolaire</label>'
    +'<select id="f_saison">'+annees.map(a=>'<option value="'+a+'" '+(a===DB.saison?'selected':'')+'>'+a+'</option>').join('')+'</select></div>'
    +'<p style="font-size:13px;color:var(--gris-txt);margin-top:8px">Le planning de la saison actuelle sera conserve. La nouvelle saison demarre vide.</p>'
    +'<div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">Annuler</button>'
    +'<button class="btn-save" onclick="changerSaison(document.getElementById(&quot;f_saison&quot;).value);closeModal()">Changer de saison</button></div>');
}

function renderPlanning(moisActif) {
  const mois = getSaisonMois(DB.saison);
  const today = new Date().toISOString().slice(0,10);
  if (!moisActif) {
    const todayMois = today.slice(0,7);
    const cur = mois.find(m => m.an+'-'+m.num === todayMois);
    moisActif = cur ? cur.num+'-'+cur.an : mois[0].num+'-'+mois[0].an;
  }
  const [mActif, aActif] = moisActif.split('-');
  const evtsTotal = DB.planning.length;
  const evtsFuturs = DB.planning.filter(p=>p.date>=today).length;
  function countMois(m) { return DB.planning.filter(p=>p.date.startsWith(m.an+'-'+m.num)).length; }
  const typeColors = {formation:'#2563b0',exercice:'#b45309',ceremonie:'#166534',controle:'#b91c1c',sortie:'#6b21a8'};
  const typeBg = {formation:'#dbeafe',exercice:'#fef3c7',ceremonie:'#dcfce7',controle:'#fee2e2',sortie:'#f3e8ff'};

  const evts = DB.planning.filter(p=>p.date.startsWith(aActif+'-'+mActif)).sort((a,b)=>a.date.localeCompare(b.date));
  const firstDay = new Date(aActif+'-'+mActif+'-01');
  const lastDay = new Date(parseInt(aActif), parseInt(mActif), 0).getDate();
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const cells = [];
  for (let i=0;i<startDow;i++) cells.push(null);
  for (let d=1;d<=lastDay;d++) cells.push(d);

  const jours = ['L','M','M','J','V','S','D'];
  let calHtml = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px">';
  jours.forEach(j => { calHtml += '<div style="text-align:center;font-size:12px;font-weight:700;color:var(--gris-txt);padding:4px 0">'+j+'</div>'; });
  calHtml += '</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
  cells.forEach(d => {
    if (!d) { calHtml += '<div></div>'; return; }
    const dateStr = aActif+'-'+mActif+'-'+String(d).padStart(2,'0');
    const dayEvts = evts.filter(e=>e.date===dateStr);
    const isToday = dateStr===today;
    const isPast = dateStr<today;
    calHtml += '<div style="min-height:64px;border-radius:8px;padding:4px;border:1px solid var(--gris-bord);background:'+(isToday?'#dbeafe':isPast&&!dayEvts.length?'var(--gris-bg)':'white')+'">';
    calHtml += '<div style="font-size:12px;font-weight:'+(isToday?'700':'500')+';color:'+(isToday?'var(--bleu)':isPast?'var(--gris-txt)':'#1f2937')+';margin-bottom:3px">'+d+'</div>';
    dayEvts.forEach(e => {
      calHtml += '<div title="'+e.titre+' — '+e.lieu+'" onclick="showEvtDetail('+e.id+')" style="font-size:10px;background:'+(typeBg[e.type]||'#f3f4f6')+';color:'+(typeColors[e.type]||'#374151')+';border-radius:4px;padding:2px 4px;margin-bottom:2px;line-height:1.3;cursor:pointer;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+e.titre+'</div>';
    });
    calHtml += '</div>';
  });
  calHtml += '</div>';

  let listeHtml = '';
  if (evts.length) {
    listeHtml = '<div style="margin-top:16px"><div style="font-size:13px;font-weight:700;color:var(--gris-txt);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Evenements du mois</div>';
    evts.forEach(e => {
      const col = typeColors[e.type]||'#374151';
      const bg = typeBg[e.type]||'#f3f4f6';
      listeHtml += '<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:white;border-radius:10px;border-left:4px solid '+col+';border-top:.5px solid var(--gris-bord);border-right:.5px solid var(--gris-bord);border-bottom:.5px solid var(--gris-bord);margin-bottom:8px">'
        +'<div style="min-width:36px;text-align:center;background:'+bg+';border-radius:6px;padding:4px 6px"><div style="font-size:18px;font-weight:700;color:'+col+';line-height:1">'+e.date.slice(8)+'</div></div>'
        +'<div style="flex:1"><div style="font-size:14px;font-weight:600">'+e.titre+'</div><div style="font-size:12px;color:var(--gris-txt)"><i class="ti ti-map-pin" style="font-size:12px"></i> '+e.lieu+'</div></div>'
        +'<span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:'+bg+';color:'+col+'">'+e.type+'</span>'
        +'<button onclick="deleteItem(\'planning\','+e.id+',\'planning\')" style="background:none;border:none;cursor:pointer;color:var(--rouge);padding:4px"><i class="ti ti-trash"></i></button>'
        +'</div>';
    });
    listeHtml += '</div>';
  } else {

  DB.planning.push({ id: nextId(DB.planning),
    date: document.getElementById('f_date').value,
    titre: document.getElementById('f_titre').value,
    type: document.getElementById('f_type').value,
    lieu: document.getElementById('f_lieu').value });
  saveData(); closeModal(); showSection('planning');
}

async function importSheets() {
  const url = document.getElementById('sheetsUrl').value.trim();
  if (!url) return alert('Colle d\'abord l\'URL de ton Sheets');
  const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (!match) return alert('URL Google Sheets non reconnue');
  const id = match[1];
  const csvUrl = `https://docs.google.com/spreadsheets/d/${id}/export?format=csv`;
  try {
    const resp = await fetch(csvUrl);
    const text = await resp.text();
    const lines = text.trim().split('\n').slice(1);
    let count = 0;
    lines.forEach(line => {
      const cols = line.split(',').map(c => c.replace(/^"|"$/g,'').trim());
      if (cols[0] && cols[1]) {
        DB.planning.push({ id: nextId(DB.planning), date: cols[0], titre: cols[1], type: cols[2]||'formation', lieu: cols[3]||'CIS Cruzy' });
        count++;
      }
    });
    saveData();
    alert(`${count} événement(s) importé(s) !`);
    showSection('planning');
  } catch(e) {
    alert('Erreur d\'import. Vérifie que le Sheets est partagé publiquement en lecture.');
  }
}

function renderParentPlanning(moisActif) {
  const mois = [
    {num:'09',an:'2025',label:'Sep 2025'},{num:'10',an:'2025',label:'Oct 2025'},
    {num:'11',an:'2025',label:'Nov 2025'},{num:'12',an:'2025',label:'Déc 2025'},
    {num:'01',an:'2026',label:'Jan 2026'},{num:'02',an:'2026',label:'Fév 2026'},
    {num:'03',an:'2026',label:'Mar 2026'},{num:'04',an:'2026',label:'Avr 2026'},
    {num:'05',an:'2026',label:'Mai 2026'},{num:'06',an:'2026',label:'Juin 2026'},
    {num:'07',an:'2026',label:'Juil 2026'},{num:'08',an:'2026',label:'Août 2026'}
  ];
  const today = new Date().toISOString().slice(0,10);
  if (!moisActif) {
    const todayMois = today.slice(0,7);
    const cur = mois.find(m => `${m.an}-${m.num}` === todayMois);
    moisActif = cur ? cur.num+'-'+cur.an : '09-2025';
  }
  const [mActif, aActif] = moisActif.split('-');

  function countMois(m) { return DB.planning.filter(p=>p.date.startsWith(`${m.an}-${m.num}`)).length; }

  const typeColors = {formation:'#2563b0',exercice:'#b45309',ceremonie:'#166534',controle:'#b91c1c',sortie:'#6b21a8'};
  const typeBg = {formation:'#dbeafe',exercice:'#fef3c7',ceremonie:'#dcfce7',controle:'#fee2e2',sortie:'#f3e8ff'};

  const evts = DB.planning.filter(p=>p.date.startsWith(`${aActif}-${mActif}`)).sort((a,b)=>a.date.localeCompare(b.date));
  const firstDay = new Date(`${aActif}-${mActif}-01`);
  const lastDay = new Date(aActif, parseInt(mActif), 0).getDate();
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const cells = [];
  for (let i=0;i<startDow;i++) cells.push(null);
  for (let d=1;d<=lastDay;d++) cells.push(d);

  const jours = ['L','M','M','J','V','S','D'];
  let calHtml = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px">`;
  jours.forEach(j => { calHtml += `<div style="text-align:center;font-size:12px;font-weight:700;color:var(--gris-txt);padding:4px 0">${j}</div>`; });
  calHtml += `</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">`;
  cells.forEach(d => {
    if (!d) { calHtml += `<div></div>`; return; }
    const dateStr = `${aActif}-${mActif}-${String(d).padStart(2,'0')}`;
    const dayEvts = evts.filter(e=>e.date===dateStr);
    const isToday = dateStr===today;
    const isPast = dateStr<today;
    calHtml += `<div style="min-height:64px;border-radius:8px;padding:4px;border:1px solid var(--gris-bord);background:${isToday?'#dbeafe':isPast&&!dayEvts.length?'var(--gris-bg)':'white'}">`;
    calHtml += `<div style="font-size:12px;font-weight:${isToday?'700':'500'};color:${isToday?'var(--bleu)':isPast?'var(--gris-txt)':'#1f2937'};margin-bottom:3px">${d}</div>`;
    dayEvts.forEach(e => {
      calHtml += `<div title="${e.titre}" style="font-size:10px;background:${typeBg[e.type]||'#f3f4f6'};color:${typeColors[e.type]||'#374151'};border-radius:4px;padding:2px 4px;margin-bottom:2px;line-height:1.3;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${e.titre}</div>`;
    });
    calHtml += `</div>`;
  });
  calHtml += `</div>`;

  let listeHtml = evts.length ? `<div style="margin-top:16px">` : `<div style="text-align:center;color:var(--gris-txt);font-size:14px;padding:24px 0"><i class="ti ti-calendar-off" style="font-size:32px;display:block;margin-bottom:8px"></i>Aucun événement ce mois</div>`;
  if (evts.length) {
    evts.forEach(e => {
      const col = typeColors[e.type]||'#374151';
      const bg = typeBg[e.type]||'#f3f4f6';
      listeHtml += `<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:white;border-radius:10px;border-left:4px solid ${col};border:.5px solid var(--gris-bord);border-left:4px solid ${col};margin-bottom:8px">
        <div style="min-width:36px;text-align:center;background:${bg};border-radius:6px;padding:4px 6px"><div style="font-size:18px;font-weight:700;color:${col};line-height:1">${e.date.slice(8)}</div></div>
        <div style="flex:1"><div style="font-size:14px;font-weight:600">${e.titre}</div><div style="font-size:12px;color:var(--gris-txt)"><i class="ti ti-map-pin" style="font-size:12px"></i> ${e.lieu}</div></div>
        <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:${bg};color:${col}">${e.type}</span>
      </div>`;
    });
    listeHtml += `</div>`;
  }

  const onglets = `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px">
    ${mois.map(m => {
      const key = m.num+'-'+m.an;
      const cnt = countMois(m);
      const isActif = key === moisActif;
      return `<button onclick="window._planningParentMois='${key}';showSection('parent-planning')"
        style="padding:6px 12px;border-radius:8px;border:1.5px solid ${isActif?'var(--bleu)':'var(--gris-bord)'};background:${isActif?'var(--bleu)':'white'};color:${isActif?'white':'#374151'};font-size:13px;font-weight:${isActif?'700':'500'};cursor:pointer;position:relative">
        ${m.label}${cnt>0?`<span style="position:absolute;top:-6px;right:-6px;background:${isActif?'white':'var(--rouge)'};color:${isActif?'var(--rouge)':'white'};font-size:10px;font-weight:700;border-radius:10px;padding:0 5px;min-width:16px;text-align:center">${cnt}</span>`:''}
      </button>`;
    }).join('')}
  </div>`;

  const legende = `<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px">
    ${[['formation','#dbeafe','#2563b0'],['exercice','#fef3c7','#b45309'],['ceremonie','#dcfce7','#166534'],['controle','#fee2e2','#b91c1c']].map(([t,bg,col])=>
      `<span style="font-size:12px;font-weight:600;padding:3px 12px;border-radius:20px;background:${bg};color:${col}">${t}</span>`
    ).join('')}
  </div>`;

  return `
    <div class="section-header"><h2><i class="ti ti-calendar-event" aria-hidden="true"></i> Planning de la section</h2></div>
    ${legende}
    ${onglets}
    <div style="background:white;border-radius:12px;border:.5px solid var(--gris-bord);padding:16px">
      ${calHtml}${listeHtml}
    </div>`;
}

function renderBilanForm(j, bilan, saison) {
  var notes = bilan.notes || {};
  var html = '<div style="background:white;border-radius:12px;border:.5px solid var(--gris-bord);padding:20px">';
  
  // Header JSP
  html += '<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--bleu)">';
  html += '<div style="background:var(--bleu);color:white;border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700">'+j.prenom[0]+j.nom[0]+'</div>';
  html += '<div><div style="font-size:18px;font-weight:700">'+j.prenom+' '+j.nom+'</div>';
  html += '<div style="font-size:13px;color:var(--gris-txt)"><span style="background:var(--bleu-pale);color:var(--bleu);padding:2px 10px;border-radius:20px;font-weight:700;font-size:12px">'+j.promotion+'</span> — Saison '+saison+'</div></div>';
  html += '<div style="margin-left:auto;display:flex;gap:8px">';
  html += '<button class="btn-add" onclick="saveBilan('+j.id+',\''+saison+'\')"><i class="ti ti-device-floppy"></i> Sauvegarder</button>';
  html += '</div></div>';

  // Sections évaluation
  BILAN_SECTIONS.forEach(function(sec) {
    html += '<div style="margin-bottom:20px">';
    html += '<div style="background:var(--bleu);color:white;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;margin-bottom:10px">'+sec.label+'</div>';
    
    sec.items.forEach(function(item) {
      const key = sec.id+'__'+item;
      const val = notes[key] || '';
      html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:.5px solid var(--gris-bord)">';
      html += '<div style="flex:1;font-size:14px">'+item+'</div>';
      html += '<div style="display:flex;gap:6px;">';
      NOTES.forEach(function(n) {
        const active = val === n;
        html += '<button onclick="setBilanNote('+j.id+',\''+saison+'\',\''+key+'\',\''+n+'\')" '
          +'style="padding:4px 10px;border-radius:20px;border:1.5px solid '+(active?NOTE_COLORS[n]:'var(--gris-bord)')+';'
          +'background:'+(active?NOTE_BG[n]:'white')+';color:'+(active?NOTE_COLORS[n]:'#6b7280')+';'
          +'font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap">'+n+'</button>';
      });
      html += '</div></div>';
    });
    html += '</div>';
  });

  // Section texte libre
  html += '<div style="margin-bottom:20px">';
  html += '<div style="background:var(--bleu);color:white;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;margin-bottom:10px">8. Commentaires des encadrants</div>';
  html += '<div style="display:flex;flex-direction:column;gap:10px">';
  const fields = [
    ['bilanGeneral', 'Bilan général de l\'année :'],
    ['pointsSouligner', 'Points particuliers à souligner :'],
    ['plusProgresse', 'Ce qui a le plus progressé cette année :'],
    ['aConsolider', 'Ce qui reste à consolider :']
  ];
  fields.forEach(function(f) {
    html += '<div><div style="font-size:13px;font-weight:600;margin-bottom:4px;color:#374151">'+f[1]+'</div>';
    html += '<textarea id="bf_'+f[0]+'_'+j.id+'" style="width:100%;padding:9px;border:1px solid var(--gris-bord);border-radius:8px;font-family:Arial,sans-serif;font-size:14px;min-height:70px;resize:vertical">'+(bilan[f[0]]||'')+'</textarea></div>';
  });
  html += '</div></div>';

  // Objectifs
  html += '<div style="margin-bottom:20px">';
  html += '<div style="background:var(--bleu);color:white;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;margin-bottom:10px">9. Objectifs pour l\'année prochaine</div>';
  [1,2,3].forEach(function(n) {
    html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--gris-bord)">';
    html += '<div style="font-size:14px;font-weight:600;min-width:80px">Objectif n°'+n+' :</div>';
    html += '<input id="bf_obj'+n+'_'+j.id+'" type="text" style="flex:1;padding:7px 10px;border:1px solid var(--gris-bord);border-radius:6px;font-size:14px" value="'+(bilan['obj'+n]||'')+'">';
    html += '</div>';
  });
  html += '</div>';

  // Bouton final
  html += '<div style="text-align:center;margin-top:16px">';
  html += '<button class="btn-add" style="padding:12px 30px;font-size:15px" onclick="saveBilan('+j.id+',\''+saison+'\')"><i class="ti ti-device-floppy"></i> Sauvegarder le bilan</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

function setBilanNote(jspId, saison, key, note) {
  var b = DB.bilans.find(b => b.jspId == jspId && b.saison === saison);
  if (!b) {
    b = { jspId, saison, notes: {}, bilanGeneral: '', pointsSouligner: '', plusProgresse: '', aConsolider: '', obj1: '', obj2: '', obj3: '' };
    DB.bilans.push(b);
  }
  if (!b.notes) b.notes = {};
  b.notes[key] = (b.notes[key] === note) ? '' : note; // toggle
  saveData();
  window._bilanJspId = jspId;
  showSection('bilans');
}

function saveBilan(jspId, saison) {
  var b = DB.bilans.find(b => b.jspId == jspId && b.saison === saison);
  if (!b) {
    b = { jspId, saison, notes: {} };
    DB.bilans.push(b);
  }
  const fields = ['bilanGeneral', 'pointsSouligner', 'plusProgresse', 'aConsolider'];
  fields.forEach(function(f) {
    const el = document.getElementById('bf_'+f+'_'+jspId);
    if (el) b[f] = el.value;
  });
  [1,2,3].forEach(function(n) {
    const el = document.getElementById('bf_obj'+n+'_'+jspId);
    if (el) b['obj'+n] = el.value;
  });
  saveData();
  alert('Bilan sauvegardé !');
}

function renderParentBilan() {
  const j = getMyJSP();
  if (!j) return '<p>Aucun JSP associé.</p>';
  const saison = DB.saison;
  const bilan = getBilan(j.id, saison);

  const initiales = j.prenom[0]+j.nom[0];
  var html = '<div class="enfant-card"><div class="enfant-avatar">'+initiales+'</div>';
  html += '<div><h2>Bilan annuel — '+j.prenom+' '+j.nom+'</h2>';
  html += '<p>Promotion '+j.promotion+' — Saison '+saison+'</p></div></div>';

  if (!bilan || (!bilan.notes && !bilan.bilanGeneral)) {
    html += '<div style="text-align:center;padding:40px;color:var(--gris-txt);background:white;border-radius:12px;border:.5px solid var(--gris-bord)">';
    html += '<i class="ti ti-clipboard-list" style="font-size:40px;display:block;margin-bottom:12px"></i>';
    html += '<p style="font-size:15px">Le bilan annuel n\'a pas encore été saisi par l\'encadrant.</p></div>';
    return html;
  }

  const notes = bilan.notes || {};
  html += '<div style="background:white;border-radius:12px;border:.5px solid var(--gris-bord);padding:20px">';

  BILAN_SECTIONS.forEach(function(sec) {
    const hasNotes = sec.items.some(item => notes[sec.id+'__'+item]);
    if (!hasNotes) return;
    html += '<div style="margin-bottom:20px">';
    html += '<div style="background:var(--bleu);color:white;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;margin-bottom:10px">'+sec.label+'</div>';
    sec.items.forEach(function(item) {
      const val = notes[sec.id+'__'+item];
      if (!val) return;
      html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:.5px solid var(--gris-bord)">';
      html += '<div style="font-size:14px">'+item+'</div>';
      html += '<span style="padding:4px 14px;border-radius:20px;background:'+NOTE_BG[val]+';color:'+NOTE_COLORS[val]+';font-size:12px;font-weight:700">'+val+'</span>';
      html += '</div>';
    });
    html += '</div>';
  });

  if (bilan.bilanGeneral || bilan.pointsSouligner || bilan.plusProgresse || bilan.aConsolider) {
    html += '<div style="margin-bottom:20px">';
    html += '<div style="background:var(--bleu);color:white;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;margin-bottom:10px">Commentaires des encadrants</div>';
    const fields = [
      ['bilanGeneral', 'Bilan général :'],
      ['pointsSouligner', 'Points particuliers :'],
      ['plusProgresse', 'Ce qui a le plus progressé :'],
      ['aConsolider', 'Ce qui reste à consolider :']
    ];
    fields.forEach(function(f) {
      if (!bilan[f[0]]) return;
      html += '<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:var(--bleu);margin-bottom:4px">'+f[1]+'</div>';
      html += '<div style="background:var(--gris-bg);border-radius:8px;padding:10px;font-size:14px">'+bilan[f[0]]+'</div></div>';
    });
    html += '</div>';
  }

  if (bilan.obj1 || bilan.obj2 || bilan.obj3) {
    html += '<div style="margin-bottom:20px">';
    html += '<div style="background:var(--bleu);color:white;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;margin-bottom:10px">Objectifs pour l\'année prochaine</div>';
    [1,2,3].forEach(function(n) {
      if (!bilan['obj'+n]) return;
      html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--gris-bord)">';
      html += '<div style="font-size:14px;font-weight:700;color:var(--bleu);min-width:80px">Objectif '+n+' :</div>';
      html += '<div style="font-size:14px">'+bilan['obj'+n]+'</div></div>';
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function showEvtDetail(id) {
  const e = DB.planning.find(x=>x.id==id);
  if (!e) return;
  const typeColors = {formation:'#2563b0',exercice:'#b45309',ceremonie:'#166534',controle:'#b91c1c',sortie:'#6b21a8'};
  const typeBg = {formation:'#dbeafe',exercice:'#fef3c7',ceremonie:'#dcfce7',controle:'#fee2e2',sortie:'#f3e8ff'};
  const col = typeColors[e.type]||'#374151';
  const bg = typeBg[e.type]||'#f3f4f6';
  openModal(`<h3><i class="ti ti-calendar-event"></i> Détail événement</h3>
    <div style="background:${bg};border-radius:10px;padding:16px;margin-bottom:16px">
      <div style="font-size:20px;font-weight:700;color:${col};margin-bottom:6px">${e.titre}</div>
      <div style="font-size:14px;color:#374151;margin-bottom:4px"><i class="ti ti-calendar"></i> ${fmtDate(e.date)}</div>
      <div style="font-size:14px;color:#374151;margin-bottom:4px"><i class="ti ti-map-pin"></i> ${e.lieu}</div>
      <span style="font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px;background:white;color:${col}">${e.type}</span>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Fermer</button>
      <button class="btn-danger" onclick="deleteItem('planning',${e.id},'planning');closeModal()"><i class="ti ti-trash"></i> Supprimer</button>
    </div>`);
}

function deleteItem(collection, id, section) {
  if (!confirm('Supprimer cet élément ?')) return;
  DB[collection] = DB[collection].filter(x=>x.id!=id);
  saveData(); showSection(section);
}

function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalBg').classList.remove('hidden');
}

function closeModal(e) {
  if (!e || e.target.id==='modalBg') document.getElementById('modalBg').classList.add('hidden');
}
</script>
</body>
</html>
